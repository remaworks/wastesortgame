server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Global MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Global CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' '*' always;

    # Handle OPTIONS preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Serve remoteEntry.js from assets if requested from root
    location = /remoteEntry.js {
        alias /usr/share/nginx/html/assets/remoteEntry.js;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # Serve anything if it exists, else index.html
    location / {
        # Try to serve file directly, then directory, then fall back to index.html
        try_files $uri $uri/ /index.html;
    }

    # Serve static assets from the root of the web server
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
